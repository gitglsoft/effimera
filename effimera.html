<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effimera - Chat Privata</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Crimson Pro', serif; background: #0a0e27; color: #e2e8f0; height: 100vh; overflow: hidden; }
        
        /* Animazione per notifica chiamata */
        @keyframes pulse-call { 0% { background: #22c55e; } 50% { background: #15803d; transform: scale(1.05); } 100% { background: #22c55e; } }
        .incoming-call-btn { animation: pulse-call 1s infinite !important; font-weight: bold !important; color: white !important; }

        .app-container { height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at center, #16213e 0%, #0a0e27 100%); }
        
        /* Header come da screenshot */
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-area h1 { font-size: 28px; letter-spacing: 3px; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .logo-area p { font-size: 12px; color: #94a3b8; font-style: italic; }

        .actions { display: flex; gap: 12px; align-items: center; }
        .user-badge { background: #1e293b; padding: 6px 15px; border-radius: 20px; font-size: 14px; border: 1px solid #334155; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }

        .btn { padding: 8px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; color: white; }
        .btn-video { background: #22c55e; }
        .btn-clear { background: #991b1b; }
        .btn-exit { background: #9a3412; }

        /* Messaggi */
        .chat-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 70%; }
        .msg-wrap.own { align-self: flex-end; align-items: flex-end; }
        .sender-name { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; margin-bottom: 4px; padding: 0 10px; }
        .bubble { padding: 12px 18px; border-radius: 15px; background: #1e293b; border: 1px solid #334155; line-height: 1.5; position: relative; }
        .own .bubble { background: #312e81; border-color: #4338ca; }
        
        .btn-read { margin-top: 8px; background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #22c55e; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        /* Input Area */
        .input-bar { padding: 25px 40px; background: rgba(10,14,39,0.8); display: flex; gap: 15px; }
        .input-field { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px 20px; color: white; outline: none; }
        .btn-send { background: #6366f1; width: 45px; height: 45px; border-radius: 12px; border: none; display: grid; place-items: center; color: white; cursor: pointer; }

        /* Video Overlay */
        .video-box { position: fixed; bottom: 100px; right: 40px; width: 280px; height: 380px; background: #000; border-radius: 20px; border: 2px solid #6366f1; overflow: hidden; z-index: 1000; }
        .mini-video { position: absolute; bottom: 10px; right: 10px; width: 80px; height: 110px; background: #222; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
          authDomain: "effimera.firebaseapp.com",
          databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "effimera",
          storageBucket: "effimera.firebasestorage.app",
          messagingSenderId: "730774854794",
          appId: "1:730774854794:web:7c1f52fc71e3dcdaa42173"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const App = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [user, setUser] = useState('');
            const [room, setRoom] = useState('stanza1');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [callActive, setCallActive] = useState(false);
            const [incomingCall, setIncomingCall] = useState(false);
            
            const pc = useRef(null);
            const localVideo = useRef();
            const remoteVideo = useRef();

            // Sincronizzazione Messaggi
            useEffect(() => {
                if (isLogin) return;
                const ref = database.ref(`rooms/${room}/messages`);
                ref.on('value', (snap) => {
                    const data = snap.val() || {};
                    const list = Object.entries(data).map(([id, v]) => ({ id, ...v }));
                    setMessages(list.sort((a,b) => a.ts - b.ts));
                });

                // Listener per Chiamate in Entrata
                database.ref(`rooms/${room}/call/offer`).on('value', snap => {
                    if (snap.val() && snap.val().from !== user) setIncomingCall(true);
                    else if (!snap.val()) setIncomingCall(false);
                });

                return () => ref.off();
            }, [isLogin, room, user]);

            const sendMessage = () => {
                if (!input.trim()) return;
                database.ref(`rooms/${room}/messages`).push({
                    text: input,
                    sender: user,
                    ts: Date.now()
                });
                setInput('');
            };

            const destroyMessage = (id) => {
                setTimeout(() => {
                    database.ref(`rooms/${room}/messages/${id}`).remove();
                }, 2000);
            };

            const handleLogin = () => { if (user.trim()) setIsLogin(false); };

            // Logica Video Semplificata (Signaling)
            const startVideo = async () => {
                setCallActive(true);
                database.ref(`rooms/${room}/call/offer`).set({ from: user, type: 'init' });
            };

            const acceptVideo = () => {
                setIncomingCall(false);
                setCallActive(true);
            };

            const endVideo = () => {
                database.ref(`rooms/${room}/call`).remove();
                setCallActive(false);
            };

            if (isLogin) return (
                <div style={{display:'grid', placeItems:'center', height:'100vh', background:'#0a0e27'}}>
                    <div style={{textAlign:'center', background:'#1e293b', padding:50, borderRadius:30, border:'1px solid #334155'}}>
                        <h1 style={{color:'#6366f1', marginBottom:20}}>EFFIMERA</h1>
                        <input className="input-field" placeholder="Il tuo nome..." onChange={e=>setUser(e.target.value)} style={{marginBottom:20, display:'block', width:'100%'}} />
                        <button className="btn btn-video" onClick={handleLogin} style={{width:'100%', justifyContent:'center'}}>ENTRA NELLA CHAT</button>
                    </div>
                </div>
            );

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="logo-area">
                            <h1>EFFIMERA</h1>
                            <p>Messaggi che svaniscono nel nulla</p>
                        </div>
                        <div className="actions">
                            <div className="user-badge"><div className="dot"></div> Tu: {user}</div>
                            
                            {incomingCall ? (
                                <button className="btn incoming-call-btn" onClick={acceptVideo}>ACCETTA CHIAMATA</button>
                            ) : (
                                <button className="btn btn-video" onClick={startVideo}>Video</button>
                            )}
                            
                            <button className="btn btn-clear" onClick={() => database.ref(`rooms/${room}/messages`).remove()}>Svuota Chat</button>
                            <button className="btn btn-exit" onClick={() => window.location.reload()}>Esci</button>
                        </div>
                    </header>

                    <main className="chat-area">
                        {messages.length === 0 && <p style={{textAlign:'center', opacity:0.3, marginTop:100}}>Nessun messaggio. La privacy è garantita.</p>}
                        {messages.map(m => (
                            <div key={m.id} className={`msg-wrap ${m.sender === user ? 'own' : ''}`}>
                                <span className="sender-name">{m.sender === user ? 'ME' : m.sender}</span>
                                <div className="bubble">
                                    {m.sender !== user ? (
                                        <div style={{filter: 'blur(4px)'}} id={`text-${m.id}`}>{m.text}</div>
                                    ) : m.text}
                                    
                                    {m.sender !== user && (
                                        <button className="btn-read" onClick={(e) => {
                                            document.getElementById(`text-${m.id}`).style.filter = 'none';
                                            e.target.style.display = 'none';
                                            destroyMessage(m.id);
                                        }}>Leggi e distruggi</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </main>

                    {callActive && (
                        <div className="video-box">
                            <div style={{color:'white', padding:10, fontSize:12, textAlign:'center'}}>Videochiamata attiva...</div>
                            <video className="mini-video" autoPlay muted />
                            <button onClick={endVideo} style={{position:'absolute', bottom:10, left:10, background:'red', border:'none', color:'white', padding:'5px 10px', borderRadius:5}}>Chiudi</button>
                        </div>
                    )}

                    <footer className="input-bar">
                        <input 
                            className="input-field" 
                            value={input} 
                            onChange={e=>setInput(e.target.value)} 
                            onKeyPress={e => e.key === 'Enter' && sendMessage()}
                            placeholder="Invia un messaggio criptato..." 
                        />
                        <button className="btn-send" onClick={sendMessage}>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        </button>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
