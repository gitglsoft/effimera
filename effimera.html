<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Effimera - Real-Time</title>

    <!-- React + Babel per JSX in browser -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase compat -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
          authDomain: "effimera.firebaseapp.com",
          databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "effimera",
          storageBucket: "effimera.firebasestorage.app",
          messagingSenderId: "730774854794",
          appId: "1:730774854794:web:7c1f52fc71e3dcdaa42173"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const serverTimestamp = firebase.database.ServerValue.TIMESTAMP;

        // Icone
        const Icons = {
            Send:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Eye:      ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            EyeOff:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>,
            Trash2:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Lock:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Unlock:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
            Copy:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            Check:    ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Link:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            X:        ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Loader:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="spinning"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>,
        };

        const EphemeralChat = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [roomId, setRoomId] = useState('');
            const [isSetup, setIsSetup] = useState(false);
            const [isCreator, setIsCreator] = useState(false);
            const [showShareModal, setShowShareModal] = useState(false);
            const [copied, setCopied] = useState(false);
            const [readMessages, setReadMessages] = useState(new Set());
            const [firebaseError, setFirebaseError] = useState(false);
            const [firebaseErrorMsg, setFirebaseErrorMsg] = useState('');
            const [presenceMap, setPresenceMap] = useState({});
            const [otherTyping, setOtherTyping] = useState(false);

            // videochat
            const [callActive, setCallActive] = useState(false);
            const [localStream, setLocalStream] = useState(null);
            const [remoteStream, setRemoteStream] = useState(null);
            const [callLoading, setCallLoading] = useState(false);

            const pcRef = useRef(null);
            const messagesEndRef = useRef(null);
            const typingTimeoutRef = useRef(null);

            // Firebase refs per signaling
            const getCallRefBase = () => roomId ? database.ref(`rooms/${roomId}/call`) : null;
            const getOfferRef = () => getCallRefBase()?.child('offer');
            const getAnswerRef = () => getCallRefBase()?.child('answer');
            const getCallerCandidatesRef = () => getCallRefBase()?.child('callerCandidates');
            const getCalleeCandidatesRef = () => getCallRefBase()?.child('calleeCandidates');

            const signalingListenersRef = useRef([]);

            const addSignalingListener = (ref, event, handler) => {
                if (!ref) return;
                ref.on(event, handler);
                signalingListenersRef.current.push({ ref, event, handler });
            };

            const clearSignalingListeners = () => {
                signalingListenersRef.current.forEach(({ ref, event, handler }) => {
                    ref.off(event, handler);
                });
                signalingListenersRef.current = [];
            };

            const getActiveUsers = () => {
                if (!presenceMap) return [];
                return Object.entries(presenceMap)
                    .filter(([_, online]) => online === true)
                    .map(([name]) => name);
            };

            // init
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const rid = params.get('room');
                if (rid) {
                    setRoomId(rid);
                    const savedUser = localStorage.getItem(`chat_${rid}_user`);
                    const savedCreator = localStorage.getItem(`chat_${rid}_creator`);
                    if (savedUser) {
                        setCurrentUser(savedUser);
                        setUserName(savedUser);
                        setIsCreator(savedCreator === 'true');
                        setIsSetup(true);
                    }
                }
            }, []);

            // messaggi
            useEffect(() => {
                if (!roomId || !isSetup) return;
                const messagesRef = database.ref(`rooms/${roomId}/messages`);
                messagesRef.on('value', (snap) => {
                    const data = snap.val();
                    if (!data) {
                        setMessages([]);
                        return;
                    }
                    const arr = Object.entries(data).map(([id, v]) => ({ id, ...v }));
                    arr.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    setMessages(arr);
                }, (err) => {
                    console.error(err);
                    setFirebaseErrorMsg(err?.message || String(err));
                    setFirebaseError(true);
                });
                return () => messagesRef.off('value');
            }, [roomId, isSetup]);

            // presenza
            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;
                const presenceRef = database.ref(`rooms/${roomId}/presence/${currentUser}`);
                const connectedRef = database.ref('.info/connected');
                const handler = connectedRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        presenceRef.onDisconnect().set(false);
                        presenceRef.set(true);
                    }
                });
                return () => {
                    connectedRef.off('value', handler);
                    presenceRef.set(false);
                };
            }, [roomId, isSetup, currentUser]);

            useEffect(() => {
                if (!roomId || !isSetup) return;
                const presenceRef = database.ref(`rooms/${roomId}/presence`);
                presenceRef.on('value', (snap) => {
                    setPresenceMap(snap.val() || {});
                });
                return () => presenceRef.off('value');
            }, [roomId, isSetup]);

            // typing
            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;
                const typingRef = database.ref(`rooms/${roomId}/typing`);
                typingRef.on('value', (snap) => {
                    const data = snap.val() || {};
                    const someoneElse = Object.entries(data).some(
                        ([user, val]) => user !== currentUser && val === true
                    );
                    setOtherTyping(someoneElse);
                });
                return () => typingRef.off('value');
            }, [roomId, isSetup, currentUser]);

            // autosroll
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const generateRoomId = () =>
                Math.random().toString(36).substring(2,15) +
                Math.random().toString(36).substring(2,15);

            const createNewRoom = async () => {
                if (!userName.trim()) return;
                const newId = generateRoomId();
                setRoomId(newId);
                setCurrentUser(userName.trim());
                setIsCreator(true);
                localStorage.setItem(`chat_${newId}_user`, userName.trim());
                localStorage.setItem(`chat_${newId}_creator`, 'true');
                setIsSetup(true);
                try {
                    await database.ref(`rooms/${newId}`).set({
                        createdAt: serverTimestamp,
                        createdBy: userName.trim()
                    });
                    window.history.pushState({}, '', `?room=${newId}`);
                    setShowShareModal(true);
                } catch (err) {
                    console.error(err);
                    setFirebaseErrorMsg(err?.message || String(err));
                    setFirebaseError(true);
                }
            };

            const joinRoom = () => {
                if (!userName.trim() || !roomId) return;
                const activeUsers = getActiveUsers();
                if (activeUsers.length >= 2 && !activeUsers.includes(userName.trim())) {
                    alert("Questa stanza è già occupata da due persone.");
                    return;
                }
                setCurrentUser(userName.trim());
                localStorage.setItem(`chat_${roomId}_user`, userName.trim());
                setIsSetup(true);
            };

            const sendMessage = async () => {
                if (!inputText.trim()) return;
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                database.ref(`rooms/${roomId}/typing/${currentUser}`).set(false);
                try {
                    const messagesRef = database.ref(`rooms/${roomId}/messages`);
                    await messagesRef.push({
                        text: inputText.trim(),
                        sender: currentUser,
                        timestamp: serverTimestamp,
                        read: false
                    });
                    setInputText('');
                } catch (err) {
                    console.error(err);
                    alert("Errore durante l'invio");
                }
            };

            const markAsRead = async (msgId) => {
                setReadMessages(prev => new Set([...prev, msgId]));
                setTimeout(async () => {
                    try {
                        await database.ref(`rooms/${roomId}/messages/${msgId}`).remove();
                        setReadMessages(prev => {
                            const ns = new Set(prev);
                            ns.delete(msgId);
                            return ns;
                        });
                    } catch {}
                }, 1400);
            };

            const clearAll = async () => {
                if (!confirm("Cancellare tutti i messaggi?")) return;
                try {
                    await database.ref(`rooms/${roomId}/messages`).remove();
                    setReadMessages(new Set());
                } catch (err) {
                    console.error(err);
                }
            };

            const stopLocalStreamTracks = () => {
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                }
            };

            const resetCallState = async () => {
                setCallActive(false);
                setCallLoading(false);
                stopLocalStreamTracks();
                setLocalStream(null);
                setRemoteStream(null);
                if (pcRef.current) {
                    pcRef.current.onicecandidate = null;
                    pcRef.current.ontrack = null;
                    pcRef.current.onnegotiationneeded = null;
                    pcRef.current.onconnectionstatechange = null;
                    try { pcRef.current.close(); } catch {}
                    pcRef.current = null;
                }
                clearSignalingListeners();
            };

            const leaveChat = () => {
                if (roomId && currentUser) {
                    database.ref(`rooms/${roomId}/presence/${currentUser}`).set(false);
                    database.ref(`rooms/${roomId}/typing/${currentUser}`).set(false);
                }
                if (roomId) {
                    localStorage.removeItem(`chat_${roomId}_user`);
                    localStorage.removeItem(`chat_${roomId}_creator`);
                }
                resetCallState();
                setIsSetup(false);
                setCurrentUser(null);
                setUserName('');
                setMessages([]);
                setReadMessages(new Set());
                setRoomId('');
                window.history.pushState({}, '', window.location.pathname);
            };

            const terminateChat = async () => {
                if (!isCreator) return;
                if (!confirm("TERMINARE E CANCELLARE DEFINITIVAMENTE QUESTA CHAT?\n\nTutti i messaggi spariranno per sempre.\nAzione irreversibile.")) return;
                try {
                    await database.ref(`rooms/${roomId}`).remove();
                    alert("Chat eliminata completamente.");
                    leaveChat();
                } catch (err) {
                    alert("Errore durante l'eliminazione definitiva.");
                }
            };

            const getShareLink = () => `${window.location.origin}${window.location.pathname}?room=${roomId}`;

            const copyShareLink = async () => {
                try {
                    await navigator.clipboard.writeText(getShareLink());
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1800);
                } catch {}
            };

            const handleKeyPress = e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const handleInputChange = e => {
                setInputText(e.target.value);
                if (!roomId || !currentUser) return;
                const typingRef = database.ref(`rooms/${roomId}/typing/${currentUser}`);
                typingRef.set(true);
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                typingTimeoutRef.current = setTimeout(() => {
                    typingRef.set(false);
                }, 2500);
            };

            // WebRTC
            const createPeerConnection = () => {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });
                pc.onconnectionstatechange = () => {
                    if (['failed','disconnected','closed'].includes(pc.connectionState)) {
                        resetCallState();
                    }
                };
                pcRef.current = pc;
                return pc;
            };

            const startCall = async () => {
                if (!roomId || !currentUser) {
                    alert("Devi essere in una stanza per avviare la chiamata.");
                    return;
                }

                const activeUsers = getActiveUsers();
                if (activeUsers.length !== 2) {
                    alert("La videochat richiede esattamente due persone connesse nella stanza.");
                    return;
                }

                if (callActive || callLoading) {
                    endCall();
                    return;
                }

                setCallLoading(true);
                try {
                    const callRefBase = getCallRefBase();
                    await callRefBase.set(null);

                    const pc = createPeerConnection();

                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    setLocalStream(stream);
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));

                    const remote = new MediaStream();
                    setRemoteStream(remote);
                    pc.ontrack = (event) => {
                        event.streams[0].getTracks().forEach(track => {
                            remote.addTrack(track);
                        });
                    };

                    const callerCandidatesRef = getCallerCandidatesRef();
                    pc.onicecandidate = (event) => {
                        if (event.candidate && callerCandidatesRef) {
                            callerCandidatesRef.push(event.candidate.toJSON());
                        }
                    };

                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    const offerRef = getOfferRef();
                    await offerRef.set({
                        sdp: offer.sdp,
                        type: offer.type,
                        createdBy: currentUser,
                        createdAt: serverTimestamp
                    });

                    const answerRef = getAnswerRef();
                    addSignalingListener(answerRef, 'value', async (snap) => {
                        const val = snap.val();
                        if (!val || pc.currentRemoteDescription) return;
                        const answer = new RTCSessionDescription(val);
                        await pc.setRemoteDescription(answer);
                    });

                    const calleeCandidatesRef = getCalleeCandidatesRef();
                    addSignalingListener(calleeCandidatesRef, 'child_added', async (snap) => {
                        const data = snap.val();
                        if (!data) return;
                        try {
                            await pc.addIceCandidate(new RTCIceCandidate(data));
                        } catch (err) {
                            console.error(err);
                        }
                    });

                    setCallActive(true);
                } catch (err) {
                    console.error(err);
                    alert("Errore nell'avvio della videochiamata");
                    resetCallState();
                } finally {
                    setCallLoading(false);
                }
            };

            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;

                const offerRef = getOfferRef();
                const answerRef = getAnswerRef();
                const callerCandidatesRef = getCallerCandidatesRef();
                const calleeCandidatesRef = getCalleeCandidatesRef();

                const offerHandler = async (snap) => {
                    const data = snap.val();
                    if (!data) return;
                    if (data.createdBy === currentUser) return;
                    if (pcRef.current && pcRef.current.signalingState !== 'closed') return;

                    try {
                        setCallLoading(true);

                        const activeUsers = getActiveUsers();
                        if (activeUsers.length !== 2) {
                            return;
                        }

                        const pc = createPeerConnection();

                        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        setLocalStream(stream);
                        stream.getTracks().forEach(track => pc.addTrack(track, stream));

                        const remote = new MediaStream();
                        setRemoteStream(remote);
                        pc.ontrack = (event) => {
                            event.streams[0].getTracks().forEach(track => {
                                remote.addTrack(track);
                            });
                        };

                        pc.onicecandidate = (event) => {
                            if (event.candidate && calleeCandidatesRef) {
                                calleeCandidatesRef.push(event.candidate.toJSON());
                            }
                        };

                        const offerDesc = new RTCSessionDescription(data);
                        await pc.setRemoteDescription(offerDesc);

                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);

                        await answerRef.set({
                            type: answer.type,
                            sdp: answer.sdp,
                            createdBy: currentUser,
                            createdAt: serverTimestamp
                        });

                        addSignalingListener(callerCandidatesRef, 'child_added', async (snapC) => {
                            const cand = snapC.val();
                            if (!cand) return;
                            try {
                                await pc.addIceCandidate(new RTCIceCandidate(cand));
                            } catch (err) {
                                console.error(err);
                            }
                        });

                        setCallActive(true);
                    } catch (err) {
                        console.error(err);
                        resetCallState();
                    } finally {
                        setCallLoading(false);
                    }
                };

                offerRef?.on('value', offerHandler);
                signalingListenersRef.current.push({ ref: offerRef, event: 'value', handler: offerHandler });

                return () => {
                    clearSignalingListeners();
                };
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [roomId, isSetup, currentUser]);

            const endCall = async () => {
                await resetCallState();
                const callRefBase = getCallRefBase();
                if (callRefBase) {
                    try {
                        await callRefBase.set(null);
                    } catch (err) {
                        console.error(err);
                    }
                }
            };

            if (firebaseError) {
                return (
                    <div style={{height:'100vh', display:'grid', placeItems:'center', background:'#07090f', color:'white'}}>
                        <div style={{maxWidth:520, padding:'2.2rem', background:'rgba(239,68,68,0.08)', border:'1px solid rgba(239,68,68,.25)', borderRadius:20, boxShadow:'0 0 40px rgba(239,68,68,.08)'}}>
                            <h1 style={{color:'#fca5a5',fontWeight:700,marginBottom:'.8rem'}}>Errore di connessione</h1>
                            <p style={{color:'#94a3b8',fontSize:'.93rem'}}>{firebaseErrorMsg ? firebaseErrorMsg : 'Controlla la console (F12) per dettagli.'}</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="chat-container">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

                        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

                        body {
                            font-family: 'Inter', sans-serif;
                            background: #07090f;
                            min-height: 100vh;
                            overflow: hidden;
                            color: #e2e8f0;
                            -webkit-font-smoothing: antialiased;
                        }

                        /* ── SCROLLBAR ── */
                        ::-webkit-scrollbar { width: 5px }
                        ::-webkit-scrollbar-track { background: transparent }
                        ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.35); border-radius: 99px }
                        ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,.6) }

                        /* ── ANIMATED BG ── */
                        .chat-container {
                            position: relative;
                            width: 100vw;
                            height: 100vh;
                            display: flex;
                            flex-direction: column;
                            background: #07090f;
                            overflow: hidden;
                        }
                        .chat-container::before {
                            content: '';
                            position: absolute;
                            inset: 0;
                            background:
                                radial-gradient(ellipse 80% 60% at 10% 10%, rgba(99,102,241,.13) 0%, transparent 60%),
                                radial-gradient(ellipse 60% 50% at 90% 85%, rgba(236,72,153,.10) 0%, transparent 55%),
                                radial-gradient(ellipse 50% 40% at 55% 50%, rgba(139,92,246,.06) 0%, transparent 50%);
                            pointer-events: none;
                            animation: bgPulse 8s ease-in-out infinite alternate;
                        }
                        @keyframes bgPulse {
                            0%   { opacity: 1 }
                            100% { opacity: 0.65 }
                        }

                        /* floating orbs */
                        .chat-container::after {
                            content: '';
                            position: absolute;
                            width: 420px; height: 420px;
                            border-radius: 50%;
                            background: radial-gradient(circle, rgba(99,102,241,.07) 0%, transparent 70%);
                            top: -100px; right: -100px;
                            animation: orbFloat 12s ease-in-out infinite;
                            pointer-events: none;
                        }
                        @keyframes orbFloat {

                                {messages.length === 0 ? (
                                    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#334155',textAlign:'center',gap:'1.2rem'}}>
                                        <div style={{width:80,height:80,borderRadius:24,background:'rgba(99,102,241,.07)',border:'1px solid rgba(99,102,241,.12)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                            <Icons.Lock size={34} style={{opacity:0.4,color:'#6366f1'}} />
                                        </div>
                                        <div>
                                            <h2 style={{color:'#475569',fontWeight:600,fontSize:'1.05rem',marginBottom:'.4rem'}}>Nessun messaggio ancora</h2>
                                            <p style={{color:'#334155',fontSize:'.88rem'}}>I messaggi si distruggono automaticamente dopo la lettura</p>
                                        </div>
                                    </div>
                                ) : messages.map(msg => {
                                    const own = msg.sender === currentUser;
                                    const canRead = !own && !readMessages.has(msg.id);
                                    const reading = readMessages.has(msg.id);
                                    return (
                                        <div key={msg.id} className={`message-wrapper ${own ? 'own' : ''} ${reading ? 'reading' : ''}`}>
                                            <div className={`message-bubble ${own ? 'sent' : 'received'}`}>
                                                <div style={{lineHeight:1.55}}>{msg.text}</div>
                                                <div style={{marginTop:'.55rem',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'.78rem',color:'#475569'}}>
                                                    <span style={{fontVariantNumeric:'tabular-nums'}}>
                                                        {msg.timestamp && new Date(msg.timestamp).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'})}
                                                    </span>
                                                    {canRead && (
                                                        <button onClick={() => markAsRead(msg.id)} className="read-button">
                                                            <Icons.Eye size={13} /> Leggi
                                                        </button>
                                                    )}
                                                    {!own && !canRead && !reading && (
                                                        <span style={{padding:'.18rem .55rem',background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:6,color:'#f59e0b',fontSize:'.76rem',fontWeight:500}}>
                                                            Letto
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                                <div ref={messagesEndRef} />
                            </div>

                            {callActive && (
                                <div style={{
                                    position:'fixed',
                                    bottom:20,
                                    right:20,
                                    width:300,
                                    height:420,
                                    borderRadius:20,
                                    overflow:'hidden',
                                    background:'rgba(10,14,39,.7)',
                                    backdropFilter:'blur(20px)',
                                    border:'1px solid rgba(99,102,241,.3)',
                                    zIndex:999
                                }}>
                                    <video autoPlay muted playsInline
                                        ref={v=>v&&(v.srcObject=localStream)}
                                        style={{
                                            position:'absolute',
                                            width:90,
                                            height:120,
                                            bottom:10,
                                            right:10,
                                            borderRadius:12
                                        }}
                                    />
                                    <video autoPlay playsInline
                                        ref={v=>v&&(v.srcObject=remoteStream)}
                                        style={{width:'100%',height:'100%',objectFit:'cover'}}
                                    />
                                    <button onClick={endCall}
                                        style={{
                                            position:'absolute',
                                            bottom:12,
                                            left:12,
                                            padding:'7px 12px',
                                            borderRadius:10,
                                            background:'rgba(239,68,68,.35)',
                                            border:'1px solid rgba(239,68,68,.5)',
                                            color:'white',
                                            cursor:'pointer',
                                            fontSize:'1rem',
                                            backdropFilter:'blur(4px)'
                                        }}>
                                        ❌
                                    </button>
                                </div>
                            )}

                            <div className="input-container">
                                {otherTyping && (
                                    <div style={{marginBottom:'.7rem'}}>
                                        <div className="typing-indicator">
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                        </div>
                                    </div>
                                )}
                                <div className="input-actions">
                                    <textarea
                                        className="message-input"
                                        value={inputText}
                                        onChange={handleInputChange}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Scrivi un messaggio..."
                                        rows={1}
                                    />
                                    <button
                                        onClick={sendMessage}
                                        disabled={!inputText.trim()}
                                        className="btn-send"
                                    >
                                        <Icons.Send size={20} /> Invia
                                    </button>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EphemeralChat />);
    </script>
</body>
</html>
