<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effimera - Chat & Video Privata</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Crimson Pro', serif; background: #0a0e27; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at center, #16213e 0%, #0a0e27 100%); }
        .header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer; color: white; font-weight: 600; }
        .btn-clear { background: #991b1b; }
        .chat-area { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrap.own { align-self: flex-end; }
        .bubble { padding: 12px 18px; border-radius: 15px; background: #1e293b; border: 1px solid #334155; }
        .own .bubble { background: #312e81; }
        .input-bar { padding: 15px; display: flex; gap: 10px; background: rgba(10,14,39,0.95); }
        .input-field { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 10px; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
            authDomain: "effimera.firebaseapp.com",
            databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "effimera"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const sessionId = sessionStorage.getItem('effimera_sid') || Math.random().toString(36).substring(7);
        sessionStorage.setItem('effimera_sid', sessionId);

        function App() {
            const [user, setUser] = useState(sessionStorage.getItem('effimera_user') || '');
            const [isLogin, setIsLogin] = useState(!user);
            const room = new URLSearchParams(window.location.search).get('room') || 'default';
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');

            useEffect(() => {
                if (isLogin) return;
                const msgRef = database.ref(`rooms/${room}/messages`).limitToLast(50);
                msgRef.on('value', snap => {
                    const data = snap.val() || {};
                    const now = Date.now();
                    const msgs = [];
                    Object.entries(data).forEach(([id, v]) => {
                        if (now - v.ts > 1800000) {
                            database.ref(`rooms/${room}/messages/${id}`).remove();
                        } else {
                            msgs.push({ id, ...v });
                        }
                    });
                    setMessages(msgs.sort((a,b) => a.ts - b.ts));
                });
                return () => msgRef.off();
            }, [isLogin, room]);

            const sendMessage = () => {
                if (!input.trim()) return;
                database.ref(`rooms/${room}/messages`).push({ text: input, sender: user, ts: Date.now(), sid: sessionId });
                setInput('');
            };

            if (isLogin) return React.createElement('div', {style:{display:'grid', placeItems:'center', height:'100vh'}},
                React.createElement('div', {style:{background:'#1e293b', padding:30, borderRadius:20}},
                    React.createElement('input', {className:'input-field', placeholder:'Tuo Nome', onChange:e=>setUser(e.target.value)}),
                    React.createElement('button', {className:'btn', style:{background:'#6366f1', marginLeft:10}, onClick:()=>user.trim() && setIsLogin(false)}, 'ENTRA')
                )
            );

            return React.createElement('div', {className:'app-container'},
                React.createElement('header', {className:'header'}, 
                    React.createElement('h1', null, 'EFFIMERA'),
                    React.createElement('button', {className:'btn btn-clear', onClick:()=>database.ref(`rooms/${room}/messages`).remove()}, 'SVUOTA')
                ),
                React.createElement('main', {className:'chat-area'}, 
                    messages.map(m => React.createElement('div', {key:m.id, className:`msg-wrap ${m.sid === sessionId ? 'own' : ''}`}, 
                        React.createElement('div', {className:'bubble'}, m.text)
                    ))
                ),
                React.createElement('footer', {className:'input-bar'},
                    React.createElement('input', {className:'input-field', value:input, onChange:e=>setInput(e.target.value), onKeyPress:e=>e.key==='Enter' && sendMessage()}),
                    React.createElement('button', {className:'btn', style:{background:'#6366f1'}, onClick:sendMessage}, '⚡')
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
