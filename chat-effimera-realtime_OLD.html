        const EphemeralChat = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [roomId, setRoomId] = useState('');
            const [isSetup, setIsSetup] = useState(false);
            const [showShareModal, setShowShareModal] = useState(false);
            const [copied, setCopied] = useState(false);
            const [readMessages, setReadMessages] = useState(new Set());
            const [selectedImage, setSelectedImage] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const [firebaseError, setFirebaseError] = useState(false);
            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);

            // Inizializzazione: controlla URL
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const urlRoomId = urlParams.get('room');
                
                if (urlRoomId) {
                    setRoomId(urlRoomId);
                    loadUserData(urlRoomId);
                }
            }, []);

            // Carica dati utente dal localStorage
            const loadUserData = (roomId) => {
                const savedUser = localStorage.getItem(`chat_${roomId}_user`);
                
                if (savedUser) {
                    setCurrentUser(savedUser);
                    setUserName(savedUser);
                    setIsSetup(true);
                }
            };

            // Ascolta i messaggi in tempo reale da Firebase
            useEffect(() => {
                if (!roomId || !isSetup) return;

                const messagesRef = database.ref(`rooms/${roomId}/messages`);
                
                const handleNewMessage = (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const messagesArray = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        })).sort((a, b) => a.timestamp - b.timestamp);
                        
                        setMessages(messagesArray);
                    } else {
                        setMessages([]);
                    }
                };

                const handleError = (error) => {
                    console.error("Errore Firebase:", error);
                    setFirebaseError(true);
                };

                messagesRef.on('value', handleNewMessage, handleError);

                return () => {
                    messagesRef.off('value', handleNewMessage);
                };
            }, [roomId, isSetup]);

            // Auto-scroll
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Genera ID univoco
            const generateRoomId = () => {
                return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            };

            // Crea nuova stanza
            const createNewRoom = async () => {
                if (!userName.trim()) return;
                
                const newRoomId = generateRoomId();
                setRoomId(newRoomId);
                setCurrentUser(userName.trim());
                localStorage.setItem(`chat_${newRoomId}_user`, userName.trim());
                setIsSetup(true);
                
                // Crea la stanza su Firebase
                try {
                    await database.ref(`rooms/${newRoomId}`).set({
                        createdAt: firebase.database.ServerValue.TIMESTAMP,
                        createdBy: userName.trim()
                    });
                    
                    window.history.pushState({}, '', `?room=${newRoomId}`);
                    setShowShareModal(true);
                } catch (error) {
                    console.error("Errore creazione stanza:", error);
                    setFirebaseError(true);
                }
            };

            // Entra in stanza esistente
            const joinRoom = () => {
                if (!userName.trim()) return;
                
                setCurrentUser(userName.trim());
                localStorage.setItem(`chat_${roomId}_user`, userName.trim());
                setIsSetup(true);
            };

            // Gestione selezione immagine
            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) { // Max 5MB
                        alert("L'immagine è troppo grande! Massimo 5MB.");
                        return;
                    }
                    
                    setSelectedImage(file);
                    
                    // Crea preview
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImagePreview(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Upload immagine su Firebase Storage
            const uploadImage = async (file) => {
                const fileName = `${roomId}/${Date.now()}_${file.name}`;
                const storageRef = storage.ref(fileName);
                const uploadTask = storageRef.put(file);

                return new Promise((resolve, reject) => {
                    uploadTask.on(
                        'state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            setUploadProgress(progress);
                        },
                        (error) => {
                            console.error("Errore upload:", error);
                            reject(error);
                        },
                        async () => {
                            const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                            resolve(downloadURL);
                        }
                    );
                });
            };

            // Invia messaggio
            const sendMessage = async () => {
                if (!inputText.trim() && !selectedImage) return;

                setUploading(true);
                let imageUrl = null;

                try {
                    // Upload immagine se presente
                    if (selectedImage) {
                        imageUrl = await uploadImage(selectedImage);
                    }

                    // Crea messaggio
                    const newMessage = {
                        text: inputText.trim(),
                        sender: currentUser,
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        imageUrl: imageUrl,
                        read: false
                    };

                    // Salva su Firebase
                    await database.ref(`rooms/${roomId}/messages`).push(newMessage);

                    // Reset
                    setInputText('');
                    setSelectedImage(null);
                    setImagePreview(null);
                    setUploadProgress(0);
                } catch (error) {
                    console.error("Errore invio messaggio:", error);
                    alert("Errore nell'invio del messaggio. Riprova!");
                } finally {
                    setUploading(false);
                }
            };

            // Marca come letto
            const markAsRead = async (messageId) => {
                setReadMessages(prev => new Set([...prev, messageId]));
                
                setTimeout(async () => {
                    try {
                        await database.ref(`rooms/${roomId}/messages/${messageId}`).remove();
                        setReadMessages(prev => {
                            const newSet = new Set(prev);
                            newSet.delete(messageId);
                            return newSet;
                        });
                    } catch (error) {
                        console.error("Errore cancellazione messaggio:", error);
                    }
                }, 1500);
            };

            // Cancella tutti i messaggi
            const clearAll = async () => {
                if (!window.confirm("Sei sicuro di voler cancellare tutti i messaggi?")) return;
                
                try {
                    await database.ref(`rooms/${roomId}/messages`).remove();
                    setReadMessages(new Set());
                } catch (error) {
                    console.error("Errore cancellazione:", error);
                }
            };

            // Esci
            const leaveChat = () => {
                if (roomId) {
                    localStorage.removeItem(`chat_${roomId}_user`);
                }
                setIsSetup(false);
                setCurrentUser(null);
                setUserName('');
                setMessages([]);
                setReadMessages(new Set());
                window.history.pushState({}, '', window.location.pathname);
            };

            // Ottieni link
            const getShareLink = () => {
                return `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            };

            // Copia link
            const copyShareLink = async () => {
                try {
                    await navigator.clipboard.writeText(getShareLink());
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Errore copia:', err);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            // Se Firebase non è configurato correttamente
            if (firebaseError) {
                return (
                    <div className="error-container">
                        <style>{`
                            .error-container {
                                width: 100vw;
                                height: 100vh;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
                                color: white;
                                font-family: 'Crimson Pro', serif;
                                text-align: center;
                                padding: 2rem;
                            }
                            .error-box {
                                max-width: 600px;
                                background: rgba(239, 68, 68, 0.1);
                                border: 2px solid rgba(239, 68, 68, 0.3);
                                border-radius: 20px;
                                padding: 3rem;
                            }
                            .error-box h1 {
                                color: #ef4444;
                                margin-bottom: 1rem;
                            }
                            .error-box p {
                                color: #94a3b8;
                                line-height: 1.6;
                                margin-bottom: 0.5rem;
                            }
                            .error-box code {
                                background: rgba(0, 0, 0, 0.3);
                                padding: 0.3rem 0.6rem;
                                border-radius: 4px;
                                font-family: monospace;
                            }
                        `}</style>
                        <div className="error-box">
                            <h1>⚠️ Configurazione Firebase Richiesta</h1>
                            <p>Per usare la chat in tempo reale, devi configurare Firebase.</p>
                            <p>Segui le istruzioni nel file <code>ISTRUZIONI_FIREBASE.txt</code></p>
                            <p>Una volta ottenute le credenziali, sostituiscile in <code>firebaseConfig</code></p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="chat-container">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

                            margin: 0;
                            padding: 0;
                            box-sizing: border-box;
                        }
                        
                        body {
                            font-family: 'Crimson Pro', serif;
                            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
                            min-height: 100vh;
                            overflow: hidden;
                        }
                        
                        .chat-container {
                            width: 100vw;
                            height: 100vh;
                            display: flex;
                            flex-direction: column;
                            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
                            position: relative;
                        }
                        
                        .chat-container::before {
                            content: '';
                            position: absolute;
                            top: 0;
                            left: 0;
                            right: 0;
                            bottom: 0;
                            background: 
                                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
                            pointer-events: none;
                        }

                        .spinning {
                            animation: spin 1s linear infinite;
                        }

                        @keyframes spin {
                            from { transform: rotate(0deg); }
                            to { transform: rotate(360deg); }
                        }
                        
                        /* Header */
                        .chat-header {
                            padding: 1.8rem 2.5rem;
                            background: rgba(10, 14, 39, 0.7);
                            backdrop-filter: blur(20px);
                            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            z-index: 10;
                            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
                        }
                        
                        .header-title {
                            display: flex;
                            align-items: center;
                            gap: 1rem;
                        }
                        
                        .header-title h1 {
                            font-size: 1.8rem;
                            font-weight: 700;
                            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
                            -webkit-background-clip: text;
                            -webkit-text-fill-color: transparent;
                            background-clip: text;
                            letter-spacing: -0.02em;
                        }
                        
                        .lock-icon {
                            color: #6366f1;
                            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
                            animation: pulse 3s ease-in-out infinite;
                        }

                            0%, 100% { opacity: 1; }

                                    />
                                    
                                    <button 
                                        onClick={() => fileInputRef.current?.click()}
                                        className="btn-image"
                                        disabled={uploading}
                                    >
                                        <Icons.Image size={20} />
                                    </button>
                                    
                                    <button 
                                        onClick={sendMessage}
                                        disabled={(!inputText.trim() && !selectedImage) || uploading}
                                        className="btn-send"
                                    >
                                        {uploading ? (
                                            <>
                                                <Icons.Loader size={20} />
                                                {Math.round(uploadProgress)}%
                                            </>
                                        ) : (
                                            <>
                                                <Icons.Send size={20} />
                                                Invia
                                            </>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        ReactDOM.render(<EphemeralChat />, document.getElementById('root'));
    </script>
</body>
</html>
