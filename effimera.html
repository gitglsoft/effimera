<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Effimera - Real-Time & Video</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
          authDomain: "effimera.firebaseapp.com",
          databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "effimera",
          storageBucket: "effimera.firebasestorage.app",
          messagingSenderId: "730774854794",
          appId: "1:730774854794:web:7c1f52fc71e3dcdaa42173"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        const serverTimestamp = firebase.database.ServerValue.TIMESTAMP;

        const Icons = {
            Send:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Eye:      ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            Trash2:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Lock:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Unlock:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
            Link:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            Loader:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="spinning"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line></svg>,
        };

        const EphemeralChat = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [roomId, setRoomId] = useState('');
            const [isSetup, setIsSetup] = useState(false);
            const [isCreator, setIsCreator] = useState(false);
            const [showShareModal, setShowShareModal] = useState(false);
            const [copied, setCopied] = useState(false);
            const [readMessages, setReadMessages] = useState(new Set());
            const [presenceMap, setPresenceMap] = useState({});
            const [otherTyping, setOtherTyping] = useState(false);

            // Videochat States
            const [callActive, setCallActive] = useState(false);
            const [localStream, setLocalStream] = useState(null);
            const [remoteStream, setRemoteStream] = useState(null);
            const [callLoading, setCallLoading] = useState(false);

            const pcRef = useRef(null);
            const messagesEndRef = useRef(null);
            const typingTimeoutRef = useRef(null);
            const signalingListenersRef = useRef([]);

            // Helper Refs
            const getCallRefBase = () => database.ref(`rooms/${roomId}/call`);
            const getOfferRef = () => getCallRefBase().child('offer');
            const getAnswerRef = () => getCallRefBase().child('answer');
            const getCallerCandidatesRef = () => getCallRefBase().child('callerCandidates');
            const getCalleeCandidatesRef = () => getCallRefBase().child('calleeCandidates');

            const addSignalingListener = (ref, event, handler) => {
                ref.on(event, handler);
                signalingListenersRef.current.push({ ref, event, handler });
            };

            const clearSignalingListeners = () => {
                signalingListenersRef.current.forEach(({ ref, event, handler }) => ref.off(event, handler));
                signalingListenersRef.current = [];
            };

            const getActiveUsers = () => Object.entries(presenceMap).filter(([_, online]) => online === true).map(([name]) => name);

            // Initialization
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const rid = params.get('room');
                if (rid) {
                    setRoomId(rid);
                    const savedUser = localStorage.getItem(`chat_${rid}_user`);
                    if (savedUser) {
                        setCurrentUser(savedUser);
                        setUserName(savedUser);
                        setIsCreator(localStorage.getItem(`chat_${rid}_creator`) === 'true');
                        setIsSetup(true);
                    }
                }
            }, []);

            // Messaging Logic
            useEffect(() => {
                if (!roomId || !isSetup) return;
                const messagesRef = database.ref(`rooms/${roomId}/messages`);
                messagesRef.on('value', (snap) => {
                    const data = snap.val();
                    if (!data) { setMessages([]); return; }
                    const arr = Object.entries(data).map(([id, v]) => ({ id, ...v }));
                    arr.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    setMessages(arr);
                });
                return () => messagesRef.off('value');
            }, [roomId, isSetup]);

            // Presence & Typing
            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;
                const presenceRef = database.ref(`rooms/${roomId}/presence/${currentUser}`);
                const typingRef = database.ref(`rooms/${roomId}/typing/${currentUser}`);
                
                database.ref('.info/connected').on('value', (snap) => {
                    if (snap.val()) {
                        presenceRef.onDisconnect().remove();
                        typingRef.onDisconnect().remove();
                        presenceRef.set(true);
                    }
                });

                const roomPresenceRef = database.ref(`rooms/${roomId}/presence`);
                roomPresenceRef.on('value', (snap) => setPresenceMap(snap.val() || {}));

                const roomTypingRef = database.ref(`rooms/${roomId}/typing`);
                roomTypingRef.on('value', (snap) => {
                    const data = snap.val() || {};
                    setOtherTyping(Object.entries(data).some(([u, val]) => u !== currentUser && val === true));
                });

                return () => {
                    presenceRef.remove();
                    typingRef.remove();
                    roomPresenceRef.off();
                    roomTypingRef.off();
                };
            }, [roomId, isSetup, currentUser]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // WebRTC Core Functions
            const createPeerConnection = () => {
                const pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });

                pc.onconnectionstatechange = () => {
                    if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) resetCallState();
                };

                pc.ontrack = (event) => {
                    if (event.streams && event.streams[0]) {
                        setRemoteStream(event.streams[0]);
                    }
                };

                pcRef.current = pc;
                return pc;
            };

            const resetCallState = () => {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                setLocalStream(null);
                setRemoteStream(null);
                setCallActive(false);
                setCallLoading(false);
                if (pcRef.current) {
                    pcRef.current.close();
                    pcRef.current = null;
                }
                clearSignalingListeners();
            };

            const startCall = async () => {
                const active = getActiveUsers();
                if (active.length < 2) return alert("Attendi che l'altro utente entri nella stanza.");
                
                setCallLoading(true);
                try {
                    await getCallRefBase().set(null); // Pulisci vecchia sessione
                    const pc = createPeerConnection();
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    setLocalStream(stream);
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));

                    pc.onicecandidate = (e) => e.candidate && getCallerCandidatesRef().push(e.candidate.toJSON());

                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    await getOfferRef().set({ sdp: offer.sdp, type: offer.type, createdBy: currentUser });

                    addSignalingListener(getAnswerRef(), 'value', async (snap) => {
                        const data = snap.val();
                        if (data && !pc.currentRemoteDescription) {
                            await pc.setRemoteDescription(new RTCSessionDescription(data));
                        }
                    });

                    addSignalingListener(getCalleeCandidatesRef(), 'child_added', (snap) => {
                        const data = snap.val();
                        if (data) pc.addIceCandidate(new RTCIceCandidate(data)).catch(console.error);
                    });

                    setCallActive(true);
                } catch (err) {
                    console.error(err);
                    resetCallState();
                } finally { setCallLoading(false); }
            };

            // Listen for incoming calls
            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;

                const offerRef = getOfferRef();
                const offerHandler = async (snap) => {
                    const data = snap.val();
                    if (!data || data.createdBy === currentUser || pcRef.current) return;

                    try {
                        setCallLoading(true);
                        const pc = createPeerConnection();
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                        setLocalStream(stream);
                        stream.getTracks().forEach(track => pc.addTrack(track, stream));

                        pc.onicecandidate = (e) => e.candidate && getCalleeCandidatesRef().push(e.candidate.toJSON());

                        await pc.setRemoteDescription(new RTCSessionDescription(data));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        await getAnswerRef().set({ sdp: answer.sdp, type: answer.type, createdBy: currentUser });

                        addSignalingListener(getCallerCandidatesRef(), 'child_added', (snapC) => {
                            const cand = snapC.val();
                            if (cand) pc.addIceCandidate(new RTCIceCandidate(cand)).catch(console.error);
                        });

                        setCallActive(true);
                    } catch (err) {
                        console.error(err);
                        resetCallState();
                    } finally { setCallLoading(false); }
                };

                offerRef.on('value', offerHandler);
                return () => offerRef.off('value', offerHandler);
            }, [roomId, isSetup, currentUser]);

            // Actions
            const createNewRoom = async () => {
                if (!userName.trim()) return;
                const newId = Math.random().toString(36).substring(2,15);
                setRoomId(newId);
                setCurrentUser(userName.trim());
                setIsCreator(true);
                localStorage.setItem(`chat_${newId}_user`, userName.trim());
                localStorage.setItem(`chat_${newId}_creator`, 'true');
                setIsSetup(true);
                await database.ref(`rooms/${newId}`).set({ createdAt: serverTimestamp, createdBy: userName.trim() });
                window.history.pushState({}, '', `?room=${newId}`);
                setShowShareModal(true);
            };

            const joinRoom = () => {
                if (!userName.trim() || !roomId) return;
                setCurrentUser(userName.trim());
                localStorage.setItem(`chat_${roomId}_user`, userName.trim());
                setIsSetup(true);
            };

            const sendMessage = async () => {
                if (!inputText.trim()) return;
                database.ref(`rooms/${roomId}/typing/${currentUser}`).set(false);
                await database.ref(`rooms/${roomId}/messages`).push({
                    text: inputText.trim(),
                    sender: currentUser,
                    timestamp: serverTimestamp
                });
                setInputText('');
            };

            const markAsRead = (msgId) => {
                setReadMessages(prev => new Set([...prev, msgId]));
                setTimeout(() => {
                    database.ref(`rooms/${roomId}/messages/${msgId}`).remove();
                }, 1000);
            };

            return (
                <div className="chat-container">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&display=swap');
                        * {margin:0;padding:0;box-sizing:border-box}
                        body {font-family:'Crimson Pro',serif;background:#0a0e27;color:#e2e8f0;overflow:hidden}
                        .chat-container {height:100vh;display:flex;flex-direction:column}
                        .setup-card {background:rgba(20,20,40,0.9);padding:3rem;border-radius:24px;border:1px solid #6366f1;max-width:450px;margin:auto;text-align:center}
                        .chat-header {padding:1rem 2rem;background:#10142d;border-bottom:1px solid #6366f122;display:flex;justify-content:space-between;align-items:center}
                        .messages-container {flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1rem}
                        .message-bubble {max-width:70%;padding:1rem;border-radius:15px;position:relative;background:rgba(99,102,241,0.1);border:1px solid #6366f144}
                        .own {align-self:flex-end;background:rgba(236,72,153,0.1);border-color:#ec489944}
                        .input-container {padding:1.5rem 2rem;background:#10142d;display:flex;gap:1rem}
                        .message-input {flex:1;background:#1e293b;border:1px solid #6366f144;border-radius:10px;padding:0.8rem;color:white;outline:none}
                        .btn {padding:0.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-weight:600;transition:0.2s}
                        .btn-primary {background:#6366f1;color:white}
                        .btn-video {background:#22c55e;color:white}
                        .btn-video.active {background:#ef4444}
                        .video-window {position:fixed;bottom:80px;right:20px;width:320px;height:240px;background:#000;border-radius:15px;overflow:hidden;border:2px solid #6366f1;z-index:1000}
                        .local-video {position:absolute;bottom:10px;right:10px;width:80px;height:60px;border-radius:8px;border:1px solid white;z-index:1001;transform:scaleX(-1)}
                        .remote-video {width:100%;height:100%;object-fit:cover}
                        .spinning {animation:spin 1s linear infinite}
                        @keyframes spin {to{transform:rotate(360deg)}}
                    `}</style>

                    {!isSetup ? (
                        <div className="setup-card">
                            <Icons.Lock size={48} style={{color:'#6366f1',marginBottom:'1rem'}} />
                            <h2>Chat Effimera</h2>
                            <p style={{color:'#94a3b8',marginBottom: '2rem'}}>I messaggi scompaiono dopo la lettura</p>
                            <input 
                                className="message-input" 
                                style={{width:'100%', marginBottom:'1rem'}}
                                placeholder="Il tuo nome..."
                                value={userName}
                                onChange={e => setUserName(e.target.value)}
                            />
                            <button className="btn btn-primary" style={{width:'100%'}} onClick={roomId ? joinRoom : createNewRoom}>
                                {roomId ? "Entra nella Chat" : "Crea Nuova Stanza"}
                            </button>
                        </div>
                    ) : (
                        <>
                            <div className="chat-header">
                                <div>
                                    <span style={{fontSize:'1.2rem', fontWeight:'bold'}}>🔒 Effimera</span>
                                    <small style={{marginLeft:'10px', color:'#94a3b8'}}>{getActiveUsers().length} online</small>
                                </div>
                                <div style={{display:'flex', gap:'10px'}}>
                                    <button className={`btn btn-video ${callActive ? 'active' : ''}`} onClick={callActive ? resetCallState : startCall}>
                                        {callLoading ? <Icons.Loader size={18}/> : (callActive ? "Chiudi Video" : "Avvia Video")}
                                    </button>
                                    <button className="btn btn-primary" onClick={() => setShowShareModal(true)}>Invita</button>
                                    <button className="btn" style={{background:'#334155', color:'white'}} onClick={() => location.reload()}>Esci</button>
                                </div>
                            </div>

                            <div className="messages-container">
                                {messages.map(msg => (
                                    <div key={msg.id} className={`message-bubble ${msg.sender === currentUser ? 'own' : ''}`}>
                                        <div style={{fontSize:'0.8rem', color:'#6366f1', marginBottom:'4px'}}>{msg.sender}</div>
                                        <div>{msg.text}</div>
                                        {msg.sender !== currentUser && !readMessages.has(msg.id) && (
                                            <button 
                                                onClick={() => markAsRead(msg.id)}
                                                style={{marginTop:'8px', background:'none', border:'1px solid #6366f1', color:'#6366f1', padding:'2px 8px', borderRadius:'4px', cursor:'pointer', fontSize:'0.7rem'}}
                                            >
                                                Segna come letto (distruggi)
                                            </button>
                                        )}
                                    </div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>

                            {callActive && (
                                <div className="video-window">
                                    <video className="remote-video" autoPlay playsInline ref={v => v && remoteStream && (v.srcObject = remoteStream)} />
                                    <video className="local-video" autoPlay muted playsInline ref={v => v && localStream && (v.srcObject = localStream)} />
                                </div>
                            )}

                            <div className="input-container">
                                {otherTyping && <div style={{position:'absolute', top:'-25px', fontSize:'0.8rem', color:'#6366f1'}}>Qualcuno sta scrivendo...</div>}
                                <input 
                                    className="message-input" 
                                    placeholder="Scrivi un messaggio..." 
                                    value={inputText}
                                    onChange={e => {
                                        setInputText(e.target.value);
                                        database.ref(`rooms/${roomId}/typing/${currentUser}`).set(true);
                                        if(typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                                        typingTimeoutRef.current = setTimeout(() => database.ref(`rooms/${roomId}/typing/${currentUser}`).set(false), 2000);
                                    }}
                                    onKeyPress={e => e.key === 'Enter' && sendMessage()}
                                />
                                <button className="btn btn-primary" onClick={sendMessage} disabled={!inputText.trim()}>Invia</button>
                            </div>

                            {showShareModal && (
                                <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.8)', display:'flex', zIndex:2000}}>
                                    <div className="setup-card">
                                        <h3>Condividi Link</h3>
                                        <p style={{wordBreak:'break-all', margin:'1rem 0', padding:'1rem', background:'#000', borderRadius:'10px'}}>{window.location.href}</p>
                                        <button className="btn btn-primary" onClick={() => {
                                            navigator.clipboard.writeText(window.location.href);
                                            setCopied(true);
                                            setTimeout(() => setShowShareModal(false), 1000);
                                        }}>{copied ? "Copiato!" : "Copia Link"}</button>
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EphemeralChat />);
    </script>
</body>
</html>
