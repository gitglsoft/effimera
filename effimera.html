<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effimera - Chat & Video Privata</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Crimson Pro', serif; background: #0a0e27; color: #e2e8f0; height: 100vh; overflow: hidden; }
        
        @keyframes pulse-call { 0% { background: #22c55e; } 50% { background: #15803d; transform: scale(1.05); } 100% { background: #22c55e; } }
        .incoming-call-btn { animation: pulse-call 1s infinite !important; font-weight: bold !important; }

        .app-container { height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at center, #16213e 0%, #0a0e27 100%); }
        
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(10,14,39,0.8); }
        .logo-area h1 { font-size: 28px; letter-spacing: 3px; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .logo-area p { font-size: 12px; color: #94a3b8; font-style: italic; }

        .actions { display: flex; gap: 12px; align-items: center; }
        .presence-area { display: flex; gap: 8px; align-items: center; }
        .user-badge { background: #1e293b; padding: 6px 15px; border-radius: 20px; font-size: 14px; border: 1px solid #334155; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        .dot.offline { background: #ef4444; box-shadow: none; }

        .btn { padding: 8px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; color: white; }
        .btn-video { background: #22c55e; }
        .btn-clear { background: #991b1b; }
        .btn-exit { background: #9a3412; }

        .chat-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 70%; }
        .msg-wrap.own { align-self: flex-end; align-items: flex-end; }
        .sender-name { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; margin-bottom: 4px; padding: 0 10px; }
        .bubble { padding: 12px 18px; border-radius: 15px; background: #1e293b; border: 1px solid #334155; line-height: 1.5; font-size: 16px; }
        .own .bubble { background: #312e81; border-color: #4338ca; }
        .btn-read { margin-top: 8px; background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #22c55e; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }

        .video-box { position: fixed; bottom: 100px; right: 40px; width: 300px; height: 400px; background: #000; border-radius: 20px; border: 2px solid #6366f1; overflow: hidden; z-index: 1000; display: flex; flex-direction: column; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video { position: absolute; bottom: 10px; right: 10px; width: 80px; height: 110px; background: #222; border-radius: 10px; border: 1px solid #6366f1; object-fit: cover; z-index: 1001; }

        .input-bar { padding: 25px 40px; background: rgba(10,14,39,0.9); display: flex; gap: 15px; }
        .input-field { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px 20px; color: white; outline: none; }
        .btn-send { background: #6366f1; width: 45px; height: 45px; border-radius: 12px; border: none; display: grid; place-items: center; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
          authDomain: "effimera.firebaseapp.com",
          databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "effimera"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const App = () => {
            const [isLogin, setIsLogin] = useState(true);
            const [user, setUser] = useState('');
            const [room, setRoom] = useState('');
            const [messages, setMessages] = useState([]);
            const [presence, setPresence] = useState({});
            const [input, setInput] = useState('');
            const [callActive, setCallActive] = useState(false);
            const [incomingCall, setIncomingCall] = useState(null);
            
            const pc = useRef(null);
            const localVideo = useRef();
            const remoteVideo = useRef();
            const streamRef = useRef();

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const r = params.get('room') || Math.random().toString(36).substring(2, 9);
                setRoom(r);
                const saved = localStorage.getItem(`user_${r}`);
                if (saved) { setUser(saved); setIsLogin(false); }
            }, []);

            useEffect(() => {
                if (isLogin || !room) return;

                // 1. Messaggi
                const msgRef = database.ref(`rooms/${room}/messages`);
                msgRef.on('value', snap => {
                    const data = snap.val() || {};
                    setMessages(Object.entries(data).map(([id, v]) => ({ id, ...v })).sort((a,b) => a.ts - b.ts));
                });

                // 2. Presenza (Visualizzazione utenti connessi)
                const presenceRef = database.ref(`rooms/${room}/presence`);
                const userPresenceRef = database.ref(`rooms/${room}/presence/${user}`);
                
                database.ref(".info/connected").on("value", snap => {
                    if (snap.val()) {
                        userPresenceRef.onDisconnect().remove();
                        userPresenceRef.set(true);
                    }
                });

                presenceRef.on('value', snap => setPresence(snap.val() || {}));

                // 3. Segnale Video
                const offerRef = database.ref(`rooms/${room}/video/offer`);
                offerRef.on('value', async snap => {
                    const offer = snap.val();
                    if (offer && offer.from !== user) setIncomingCall(offer);
                    else if (!offer) closeVideo();
                });

                return () => { msgRef.off(); presenceRef.off(); offerRef.off(); };
            }, [isLogin, room, user]);

            const setupWebRTC = async () => {
                pc.current = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                streamRef.current = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                if (localVideo.current) localVideo.current.srcObject = streamRef.current;
                streamRef.current.getTracks().forEach(track => pc.current.addTrack(track, streamRef.current));
                pc.current.ontrack = e => { if (remoteVideo.current) remoteVideo.current.srcObject = e.streams[0]; };
                pc.current.onicecandidate = e => {
                    if (e.candidate) database.ref(`rooms/${room}/video/candidates/${user}`).push(e.candidate.toJSON());
                };
            };

            const startCall = async () => {
                setCallActive(true);
                await setupWebRTC();
                const offer = await pc.current.createOffer();
                await pc.current.setLocalDescription(offer);
                await database.ref(`rooms/${room}/video/offer`).set({ sdp: offer.sdp, type: offer.type, from: user });

                database.ref(`rooms/${room}/video/answer`).on('value', async snap => {
                    const ans = snap.val();
                    if (ans && pc.current.signalingState === 'have-local-offer') await pc.current.setRemoteDescription(new RTCSessionDescription(ans));
                });

                database.ref(`rooms/${room}/video/candidates`).on('child_added', snap => {
                    if (snap.key !== user) snap.ref.on('child_added', c => pc.current.addIceCandidate(new RTCIceCandidate(c.val())));
                });
            };

            const acceptCall = async () => {
                const offer = incomingCall;
                setIncomingCall(null);
                setCallActive(true);
                await setupWebRTC();
                await pc.current.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.current.createAnswer();
                await pc.current.setLocalDescription(answer);
                await database.ref(`rooms/${room}/video/answer`).set({ sdp: answer.sdp, type: answer.type });
                database.ref(`rooms/${room}/video/candidates/${offer.from}`).on('child_added', snap => pc.current.addIceCandidate(new RTCIceCandidate(snap.val())));
            };

            const endCall = () => { database.ref(`rooms/${room}/video`).remove(); closeVideo(); };
            const closeVideo = () => {
                if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
                if (pc.current) pc.current.close();
                setCallActive(false);
                setIncomingCall(null);
            };

            const sendMessage = () => {
                if (!input.trim()) return;
                database.ref(`rooms/${room}/messages`).push({ text: input, sender: user, ts: Date.now() });
                setInput('');
            };

            if (isLogin) return (
                <div style={{display:'grid', placeItems:'center', height:'100vh', background:'#0a0e27'}}>
                    <div style={{textAlign:'center', background:'#1e293b', padding:50, borderRadius:30, border:'1px solid #334155', width:400}}>
                        <h1 style={{color:'#6366f1', marginBottom:10}}>EFFIMERA</h1>
                        <input className="input-field" placeholder="Tuo Nome" value={user} onChange={e=>setUser(e.target.value)} style={{width:'100%', marginBottom:20, textAlign:'center'}} />
                        <button className="btn btn-video" style={{width:'100%', justifyContent:'center'}} onClick={() => { localStorage.setItem(`user_${room}`, user); window.history.pushState({},'',`?room=${room}`); setIsLogin(false); }}>ENTRA</button>
                    </div>
                </div>
            );

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="logo-area"><h1>EFFIMERA</h1><p>Messaggi che svaniscono</p></div>
                        <div className="actions">
                            <div className="presence-area">
                                <div className="user-badge"><div className="dot"></div> Tu ({user})</div>
                                {Object.keys(presence).filter(u => u !== user).map(u => (
                                    <div key={u} className="user-badge"><div className="dot"></div> {u}</div>
                                ))}
                            </div>
                            {incomingCall ? <button className="btn incoming-call-btn" onClick={acceptCall}>ACCETTA CHIAMATA</button> : <button className="btn btn-video" onClick={startCall} disabled={callActive}>Video</button>}
                            <button className="btn btn-clear" onClick={() => database.ref(`rooms/${room}/messages`).remove()}>Svuota</button>
                            <button className="btn btn-exit" onClick={() => { localStorage.removeItem(`user_${room}`); window.location.href='/'; }}>Esci</button>
                        </div>
                    </header>

                    <main className="chat-area">
                        {messages.map(m => (
                            <div key={m.id} className={`msg-wrap ${m.sender === user ? 'own' : ''}`}>
                                <span className="sender-name">{m.sender === user ? 'ME' : m.sender}</span>
                                <div className="bubble">
                                    <div id={`txt-${m.id}`} style={{filter: m.sender !== user ? 'blur(5px)' : 'none'}}>{m.text}</div>
                                    {m.sender !== user && <button className="btn-read" onClick={(e) => { document.getElementById(`txt-${m.id}`).style.filter = 'none'; e.target.remove(); setTimeout(() => database.ref(`rooms/${room}/messages/${m.id}`).remove(), 2500); }}>Leggi</button>}
                                </div>
                            </div>
                        ))}
                    </main>

                    {callActive && (
                        <div className="video-box">
                            <video ref={remoteVideo} className="remote-video" autoPlay playsInline />
                            <video ref={localVideo} className="local-video" autoPlay muted playsInline />
                            <button onClick={endCall} style={{position:'absolute', top:10, right:10, background:'red', border:'none', color:'white', width:30, height:30, borderRadius:'50%', cursor:'pointer'}}>X</button>
                        </div>
                    )}

                    <footer className="input-bar">
                        <input className="input-field" value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter' && sendMessage()} placeholder="Messaggio..." />
                        <button className="btn-send" onClick={sendMessage}>➔</button>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
