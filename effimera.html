<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effimera - Chat Sicura</title>

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Crimson Pro', serif; background:#0a0e27; color:#e2e8f0; height:100vh; overflow:hidden; }
        #root { height: 100%; }
        
        /* Animazioni */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
          authDomain: "effimera.firebaseapp.com",
          databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "effimera",
          storageBucket: "effimera.firebasestorage.app",
          messagingSenderId: "730774854794",
          appId: "1:730774854794:web:7c1f52fc71e3dcdaa42173"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const Icons = {
            Logo: () => (
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#818cf8" strokeWidth="1.5" style={{marginRight: '15px'}}>
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <path d="M8 11h8" strokeOpacity="0.5" /><path d="M8 15h5" strokeOpacity="0.5" />
                </svg>
            ),
            Send: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Video: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>,
            Trash: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Logout: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        };

        const App = () => {
            const [roomId, setRoomId] = useState('');
            const [userName, setUserName] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [isSetup, setIsSetup] = useState(false);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [presence, setPresence] = useState({});
            const [typing, setTyping] = useState(false);

            const endRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const r = params.get('room');
                if (r) {
                    setRoomId(r);
                    const saved = localStorage.getItem('user_' + r);
                    if (saved) { setCurrentUser(saved); setIsSetup(true); }
                }
                const interval = setInterval(() => setPresence(prev => ({...prev})), 30000); // Trigger re-render per i 2 minuti
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!isSetup || !roomId) return;
                
                const msgRef = db.ref(`rooms/${roomId}/messages`);
                msgRef.on('value', s => {
                    const val = s.val() || {};
                    setMessages(Object.entries(val).map(([id, m]) => ({id, ...m})).sort((a,b) => a.time - b.time));
                });

                const myPresRef = db.ref(`rooms/${roomId}/presence/${currentUser}`);
                myPresRef.set({ status: 'online', ts: Date.now() });
                myPresRef.onDisconnect().set({ status: 'offline', ts: Date.now() });

                db.ref(`rooms/${roomId}/presence`).on('value', s => setPresence(s.val() || {}));
                db.ref(`rooms/${roomId}/typing`).on('value', s => {
                    const t = s.val() || {};
                    setTyping(Object.entries(t).some(([u, val]) => u !== currentUser && val === true));
                });

                return () => { msgRef.off(); myPresRef.remove(); };
            }, [isSetup, roomId, currentUser]);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleJoin = () => {
                if (!userName.trim()) return;
                const r = roomId || Math.random().toString(36).substr(2, 7);
                setRoomId(r);
                setCurrentUser(userName);
                localStorage.setItem('user_' + r, userName);
                setIsSetup(true);
                if (!roomId) window.history.pushState({}, '', `?room=${r}`);
            };

            const send = () => {
                if (!inputText.trim()) return;
                db.ref(`rooms/${roomId}/messages`).push({ text: inputText, sender: currentUser, time: Date.now() });
                setInputText('');
                db.ref(`rooms/${roomId}/typing/${currentUser}`).set(false);
            };

            const exit = () => {
                if(confirm("Chiudere l'applicazione e uscire?")) {
                    db.ref(`rooms/${roomId}/presence/${currentUser}`).remove();
                    localStorage.removeItem('user_' + roomId);
                    window.location.href = window.location.pathname;
                }
            };

            const clearAll = () => {
                if(confirm("Cancellare istantaneamente tutti i messaggi per tutti?")) db.ref(`rooms/${roomId}/messages`).remove();
            };

            const visibleUsers = Object.entries(presence).filter(([user, data]) => {
                if (data.status === 'online') return true;
                return (Date.now() - (data.ts || 0)) < 120000; // 2 minuti
            });

            return (
                <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
                    <style>{`
                        .header { background:#10142d; padding:20px 30px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between; align-items:center; }
                        
                        .header-brand { display:flex; align-items:center; flex:1; }
                        .header-brand h1 { font-size:30px; color:#818cf8; text-transform:uppercase; letter-spacing:3px; margin:0; line-height:1; }
                        .header-brand .slogan { font-size:14px; color:#94a3b8; font-style:italic; margin-top:4px; display:block; }
                        
                        .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:12px; }
                        
                        .user-badge { padding:6px 14px; border-radius:12px; font-size:18px; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); font-weight:600; }
                        .dot { width:10px; height:10px; border-radius:50%; }
                        .dot.online { background:#22c55e; box-shadow:0 0 10px #22c55e; }
                        .dot.offline { background:#ef4444; box-shadow:0 0 10px #ef4444; }

                        .controls { display:flex; gap:10px; }
                        .btn { border:none; padding:10px 18px; border-radius:10px; color:white; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:14px; transition:0.3s; }
                        .btn:active { transform: scale(0.95); }
                        
                        .chat-area { flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column; gap:15px; background:radial-gradient(circle at top, #111827, #0a0e27); }
                        .msg { max-width:70%; padding:14px 20px; border-radius:20px; background:#1e293b; align-self:flex-start; border-bottom-left-radius:4px; box-shadow:0 10px 25px rgba(0,0,0,0.3); }
                        .msg.me { align-self:flex-end; background:linear-gradient(135deg, #6366f1, #4338ca); border-bottom-left-radius:20px; border-bottom-right-radius:4px; }
                        
                        .input-wrapper { background:#10142d; padding:20px; border-top:1px solid #1e293b; width: 100%; }
                        .input-area { display:flex; gap:15px; max-width: 100%; margin: 0 auto; }
                        .main-in { flex:1; background:#1e293b; border:2px solid #334155; color:white; padding:16px 20px; border-radius:14px; outline:none; font-family:inherit; font-size:16px; transition: border-color 0.3s; }
                        .main-in:focus { border-color: #6366f1; }
                        
                        .btn-send { background:#4f46e5; border:none; border-radius:14px; width:60px; height:60px; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.3s; }
                        .btn-send:hover { background: #6366f1; box-shadow: 0 0 20px rgba(99,102,241,0.4); }
                    `}</style>

                    {!isSetup ? (
                        <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40}}>
                            <div style={{animation: 'pulse 2s infinite'}}><Icons.Logo /></div>
                            <h1 style={{color:'#818cf8', marginTop:20, fontSize:40, letterSpacing:4, fontWeight:700}}>EFFIMERA</h1>
                            <p style={{color:'#94a3b8', fontStyle:'italic', fontSize:18, marginBottom:40}}>Messaggi che svaniscono nel nulla</p>
                            <input className="main-in" placeholder="Inserisci il tuo nome..." value={userName} onChange={e=>setUserName(e.target.value)} style={{maxWidth:400, width:'100%', textAlign:'center', marginBottom:20}} />
                            <button className="btn" onClick={handleJoin} style={{background:'#4f46e5', width:400, padding:20, justifyContent:'center', fontSize:18}}>INIZIA SESSIONE SICURA</button>
                        </div>
                    ) : (
                        <>
                            <div className="header">
                                <div className="header-brand">
                                    <Icons.Logo />
                                    <div>
                                        <h1>Effimera</h1>
                                        <span className="slogan">Messaggi che svaniscono nel nulla</span>
                                    </div>
                                </div>
                                
                                <div className="header-right">
                                    <div style={{display:'flex', gap:10}}>
                                        <div className="user-badge" style={{color: '#818cf8'}}>
                                            <span className="dot online"></span>
                                            Tu: {currentUser}
                                        </div>
                                        {visibleUsers.map(([u, data]) => u !== currentUser && (
                                            <div key={u} className="user-badge">
                                                <span className={`dot ${data.status === 'online' ? 'online' : 'offline'}`}></span>
                                                {u}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="controls">
                                        <button className="btn" style={{background:'#22c55e'}} onClick={() => alert("Avvio modulo Video...")}><Icons.Video /> Video</button>
                                        <button className="btn" style={{background:'rgba(239,68,68,0.1)', color:'#ef4444', border:'1px solid #ef444455'}} onClick={clearAll}><Icons.Trash /> Svuota Chat</button>
                                        <button className="btn" style={{background:'rgba(245,158,11,0.1)', color:'#f59e0b', border:'1px solid #f59e0b55'}} onClick={exit}><Icons.Logout /> Esci</button>
                                    </div>
                                </div>
                            </div>

                            <div className="chat-area">
                                {messages.map(m => (
                                    <div key={m.id} className={`msg ${m.sender === currentUser ? 'me' : ''}`}>
                                        <div style={{fontSize:11, fontWeight:700, opacity:0.5, marginBottom:6, textTransform:'uppercase', letterSpacing:1}}>{m.sender}</div>
                                        <div style={{fontSize:17, lineHeight:'1.5'}}>{m.text}</div>
                                    </div>
                                ))}
                                <div ref={endRef} />
                            </div>

                            <div className="input-wrapper">
                                <div style={{maxWidth: '1200px', margin: '0 auto', position: 'relative'}}>
                                    {typing && <div style={{position:'absolute', top:-30, left:10, fontSize:13, color:'#818cf8', fontWeight:600}}>Qualcuno sta scrivendo...</div>}
                                    <div className="input-area">
                                        <input className="main-in" placeholder="Invia un messaggio criptato..." value={inputText} 
                                            onChange={e => {
                                                setInputText(e.target.value);
                                                db.ref(`rooms/${roomId}/typing/${currentUser}`).set(true);
                                                setTimeout(() => db.ref(`rooms/${roomId}/typing/${currentUser}`).set(false), 2000);
                                            }}
                                            onKeyPress={e => e.key === 'Enter' && send()}
                                        />
                                        <button className="btn-send" onClick={send}><Icons.Send /></button>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
