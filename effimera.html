<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Effimera - Real-Time</title>

    <!-- React + Babel per JSX in browser -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase compat (USARE NEL BROWSER SENZA BUNDLER) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ────────────────────────────────────────────────
        //  Firebase (compat) - funzionante in-browser senza bundler
        // ────────────────────────────────────────────────

        // SOSTITUISCI CON I TUOI VALORI (hai già copiato questo blocco)
        const firebaseConfig = {
          apiKey: "AIzaSyAMjoh5-A0FX5ImXbyTgUWJSxJE-460dfg",
          authDomain: "effimera.firebaseapp.com",
          databaseURL: "https://effimera-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "effimera",
          storageBucket: "effimera.firebasestorage.app",
          messagingSenderId: "730774854794",
          appId: "1:730774854794:web:7c1f52fc71e3dcdaa42173"
        };

        // Inizializza Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const serverTimestamp = firebase.database.ServerValue.TIMESTAMP;

        // ────────────────────────────────────────────────
        //  ICONE SVG
        // ────────────────────────────────────────────────
        const Icons = {
            Send:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>,
            Eye:      ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            EyeOff:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>,
            Trash2:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Lock:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            Unlock:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>,
            Copy:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            Check:    ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Link:     ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            X:        ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Loader:   ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="spinning"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>,
        };

        const EphemeralChat = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [currentUser, setCurrentUser] = useState(null);
            const [userName, setUserName] = useState('');
            const [roomId, setRoomId] = useState('');
            const [isSetup, setIsSetup] = useState(false);
            const [isCreator, setIsCreator] = useState(false);
            const [showShareModal, setShowShareModal] = useState(false);
            const [copied, setCopied] = useState(false);
            const [readMessages, setReadMessages] = useState(new Set());
            const [firebaseError, setFirebaseError] = useState(false);
            const [firebaseErrorMsg, setFirebaseErrorMsg] = useState('');
            const [presenceMap, setPresenceMap] = useState({});   // { userName: true/false }
            const [otherTyping, setOtherTyping] = useState(false);

            const messagesEndRef = useRef(null);
            const typingTimeoutRef = useRef(null);

            // Inizializzazione dalla URL + localStorage
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const rid = params.get('room');

                if (rid) {
                    setRoomId(rid);

                    const savedUser = localStorage.getItem(`chat_${rid}_user`);
                    const savedCreator = localStorage.getItem(`chat_${rid}_creator`);

                    if (savedUser) {
                        setCurrentUser(savedUser);
                        setUserName(savedUser);
                        setIsCreator(savedCreator === 'true');
                        setIsSetup(true);
                    }
                }
            }, []);

            // Ascolto messaggi in tempo reale
            useEffect(() => {
                if (!roomId || !isSetup) return;

                const messagesRef = database.ref(`rooms/${roomId}/messages`);

                messagesRef.on('value', (snap) => {
                    const data = snap.val();
                    if (!data) {
                        setMessages([]);
                        return;
                    }
                    const arr = Object.entries(data).map(([id, v]) => ({ id, ...v }));
                    arr.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    setMessages(arr);
                }, (err) => {
                    console.error(err);                    setFirebaseErrorMsg(err?.message || String(err));                    setFirebaseError(true);
                });

                return () => messagesRef.off('value');
            }, [roomId, isSetup]);

            // ── Presenza online ──────────────────────────────
            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;

                const presenceRef = database.ref(`rooms/${roomId}/presence/${currentUser}`);
                const connectedRef = database.ref('.info/connected');

                const handler = connectedRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        presenceRef.onDisconnect().set(false);
                        presenceRef.set(true);
                    }
                });

                return () => {
                    connectedRef.off('value', handler);
                    presenceRef.set(false);
                };
            }, [roomId, isSetup, currentUser]);

            useEffect(() => {
                if (!roomId || !isSetup) return;
                const presenceRef = database.ref(`rooms/${roomId}/presence`);
                presenceRef.on('value', (snap) => {
                    setPresenceMap(snap.val() || {});
                });
                return () => presenceRef.off('value');
            }, [roomId, isSetup]);

            // ── Typing indicator ─────────────────────────────
            useEffect(() => {
                if (!roomId || !isSetup || !currentUser) return;
                const typingRef = database.ref(`rooms/${roomId}/typing`);
                typingRef.on('value', (snap) => {
                    const data = snap.val() || {};
                    // Show dots if ANY other user is typing
                    const someoneElse = Object.entries(data).some(
                        ([user, val]) => user !== currentUser && val === true
                    );
                    setOtherTyping(someoneElse);
                });
                return () => typingRef.off('value');
            }, [roomId, isSetup, currentUser]);

            // Auto-scroll
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const generateRoomId = () =>
                Math.random().toString(36).substring(2,15) +
                Math.random().toString(36).substring(2,15);

            const createNewRoom = async () => {
                if (!userName.trim()) return;

                const newId = generateRoomId();
                setRoomId(newId);
                setCurrentUser(userName.trim());
                setIsCreator(true);

                localStorage.setItem(`chat_${newId}_user`, userName.trim());
                localStorage.setItem(`chat_${newId}_creator`, 'true');

                setIsSetup(true);

                try {
                    await database.ref(`rooms/${newId}`).set({
                        createdAt: serverTimestamp,
                        createdBy: userName.trim()
                    });
                    window.history.pushState({}, '', `?room=${newId}`);
                    setShowShareModal(true);
                } catch (err) {
                    console.error(err);
                    setFirebaseErrorMsg(err?.message || String(err));
                    setFirebaseError(true);
                }
            };

            const joinRoom = () => {
                if (!userName.trim() || !roomId) return;
                setCurrentUser(userName.trim());
                localStorage.setItem(`chat_${roomId}_user`, userName.trim());
                setIsSetup(true);
            };

            const sendMessage = async () => {
                if (!inputText.trim()) return;

                // Clear typing indicator on send
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                database.ref(`rooms/${roomId}/typing/${currentUser}`).set(false);

                try {
                    const messagesRef = database.ref(`rooms/${roomId}/messages`);
                    await messagesRef.push({
                        text: inputText.trim(),
                        sender: currentUser,
                        timestamp: serverTimestamp,
                        read: false
                    });
                    setInputText('');
                } catch (err) {
                    console.error(err);
                    alert("Errore durante l'invio");
                }
            };

            const markAsRead = async (msgId) => {
                setReadMessages(prev => new Set([...prev, msgId]));

                setTimeout(async () => {
                    try {
                        await database.ref(`rooms/${roomId}/messages/${msgId}`).remove();
                        setReadMessages(prev => {
                            const ns = new Set(prev);
                            ns.delete(msgId);
                            return ns;
                        });
                    } catch {}
                }, 1400);
            };

            const clearAll = async () => {
                if (!confirm("Cancellare tutti i messaggi?")) return;
                try {
                    await database.ref(`rooms/${roomId}/messages`).remove();
                    setReadMessages(new Set());
                } catch (err) {
                    console.error(err);
                }
            };

            const terminateChat = async () => {
                if (!isCreator) return;
                if (!confirm("TERMINARE E CANCELLARE DEFINITIVAMENTE QUESTA CHAT?\n\nTutti i messaggi spariranno per sempre.\nAzione irreversibile.")) return;

                try {
                    await database.ref(`rooms/${roomId}`).remove();
                    alert("Chat eliminata completamente.");
                    leaveChat();
                } catch (err) {
                    alert("Errore durante l'eliminazione definitiva.");
                }
            };

            const leaveChat = () => {
                if (roomId && currentUser) {
                    database.ref(`rooms/${roomId}/presence/${currentUser}`).set(false);
                    database.ref(`rooms/${roomId}/typing/${currentUser}`).set(false);
                }
                if (roomId) {
                    localStorage.removeItem(`chat_${roomId}_user`);
                    localStorage.removeItem(`chat_${roomId}_creator`);
                }
                setIsSetup(false);
                setCurrentUser(null);
                setUserName('');
                setMessages([]);
                setReadMessages(new Set());
                setRoomId('');
                window.history.pushState({}, '', window.location.pathname);
            };

            const getShareLink = () => `${window.location.origin}${window.location.pathname}?room=${roomId}`;

            const copyShareLink = async () => {
                try {
                    await navigator.clipboard.writeText(getShareLink());
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1800);
                } catch {}
            };

            const handleKeyPress = e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const handleInputChange = e => {
                setInputText(e.target.value);
                if (!roomId || !currentUser) return;
                const typingRef = database.ref(`rooms/${roomId}/typing/${currentUser}`);
                typingRef.set(true);
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                typingTimeoutRef.current = setTimeout(() => {
                    typingRef.set(false);
                }, 2500);
            };

            if (firebaseError) {
                return (
                    <div style={{height:'100vh', display:'grid', placeItems:'center', background:'linear-gradient(135deg,#0a0e27,#1a1a2e)', color:'white'}}>
                        <div style={{maxWidth:560, padding:'2rem', background:'rgba(239,68,68,0.12)', border:'1px solid #ef4444', borderRadius:16}}>
                            <h1 style={{color:'#ef4444'}}>Errore di connessione</h1>
                            <p>{firebaseErrorMsg ? firebaseErrorMsg : 'Controlla la console (F12) per dettagli.'}</p>
                        </div>
                    </div>
                );
            }

            // ────────────────────────────────────────────────
            //  RENDER
            // ────────────────────────────────────────────────
            return (
                <div className="chat-container">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

                        * {margin:0;padding:0;box-sizing:border-box}
                        body {font-family:'Crimson Pro',serif;background:linear-gradient(135deg,#0a0e27,#1a1a2e,#16213e);min-height:100vh;overflow:hidden;color:#e2e8f0}

                        .chat-container {position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;background:linear-gradient(135deg,#0a0e27,#1a1a2e,#16213e)}
                        .chat-container::before {content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,rgba(99,102,241,.08),transparent 50%),radial-gradient(circle at 80% 70%,rgba(236,72,153,.06),transparent 50%);pointer-events:none}

                        .spinning {animation:spin 1s linear infinite}
                        @keyframes spin {to{transform:rotate(360deg)}}

                        .chat-header {padding:1.6rem 2.4rem;background:rgba(10,14,39,.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(99,102,241,.2);display:flex;justify-content:space-between;align-items:center;z-index:10}
                        .header-title {display:flex;align-items:center;gap:1rem}
                        .header-title h1 {font-size:1.9rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

                        .btn {padding:.6rem 1.3rem;border:none;border-radius:10px;cursor:pointer;font-family:'Crimson Pro',serif;font-weight:600;transition:all .25s;gap:.5rem;display:inline-flex;align-items:center}
                        .btn-toggle {background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;box-shadow:0 3px 12px rgba(99,102,241,.3)}
                        .btn-toggle:hover {transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.4)}
                        .btn-clear {background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.35)}
                        .btn-clear:hover {background:rgba(239,68,68,.25)}

                        .messages-container {flex:1;overflow-y:auto;padding:2rem 2.4rem;display:flex;flex-direction:column;gap:1.4rem}
                        .message-wrapper {display:flex;gap:1rem;animation:messageIn .4s ease-out}
                        @keyframes messageIn {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
                        .message-wrapper.own {flex-direction:row-reverse}

                        .message-bubble {max-width:66%;padding:1.1rem 1.4rem;border-radius:18px;position:relative}
                        .message-bubble.received {background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.12));border:1px solid rgba(99,102,241,.25);border-bottom-left-radius:5px}
                        .message-bubble.sent {background:linear-gradient(135deg,rgba(236,72,153,.18),rgba(219,39,119,.12));border:1px solid rgba(236,72,153,.25);border-bottom-right-radius:5px}

                        .read-button {padding:.35rem .75rem;background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.4);border-radius:8px;color:#10b981;font-size:.82rem;cursor:pointer}
                        .read-button:hover {background:rgba(16,185,129,.3);transform:scale(1.04)}

                        .input-container {padding:1.4rem 2.4rem;background:rgba(10,14,39,.7);backdrop-filter:blur(20px);border-top:1px solid rgba(99,102,241,.2)}
                        .input-actions {display:flex;gap:1rem;align-items:flex-end}
                        .message-input {flex:1;padding:1rem 1.4rem;background:rgba(30,41,59,.65);border:2px solid rgba(99,102,241,.25);border-radius:14px;color:#e2e8f0;resize:none;outline:none;font-size:1.02rem;line-height:1.5}
                        .message-input:focus {border-color:#6366f1;background:rgba(30,41,59,.85);box-shadow:0 0 0 3px rgba(99,102,241,.12)}

                        .btn-send {padding:1rem 1.7rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:14px;cursor:pointer;font-weight:600;min-width:110px}
                        .btn-send:disabled {opacity:.5;cursor:not-allowed}

                        /* ── Presenza ── */
                        .presence-dot {display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:background .4s}
                        .presence-dot.online  {background:#22c55e;box-shadow:0 0 6px #22c55e}
                        .presence-dot.offline {background:#ef4444}
                        .presence-badge {display:flex;align-items:center;gap:.5rem;padding:.4rem .9rem;background:rgba(15,23,42,.5);border:1px solid rgba(99,102,241,.2);border-radius:8px;font-size:.85rem;color:#94a3b8}

                        /* ── Typing dots ── */
                        .typing-indicator {display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);border-radius:14px;border-bottom-left-radius:4px;width:fit-content;animation:messageIn .3s ease-out}
                        .typing-dot {width:8px;height:8px;border-radius:50%;background:#818cf8;animation:typingBounce 1.2s infinite ease-in-out}
                        .typing-dot:nth-child(2){animation-delay:.2s}
                        .typing-dot:nth-child(3){animation-delay:.4s}
                        @keyframes typingBounce {0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-7px);opacity:1}}

                        .setup-container,.chat-container {height:100vh;display:flex}
                        .setup-card {background:rgba(10,14,39,.92);backdrop-filter:blur(30px);border:1px solid rgba(99,102,241,.3);border-radius:24px;padding:3.2rem;max-width:520px;width:90%;margin:auto;box-shadow:0 20px 70px #00000080}
                        .btn-primary {width:100%;padding:1.2rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:14px;font-size:1.1rem;font-weight:600;cursor:pointer}
                        .btn-primary:disabled {opacity:.5;cursor:not-allowed}

                        .modal-overlay {position:fixed;inset:0;background:rgba(0,0,0,.82);display:grid;place-items:center;z-index:100}
                        .modal-content {background:rgba(10,14,39,.96);backdrop-filter:blur(30px);border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:2.6rem;max-width:520px;width:90%}
                        .link-container {background:rgba(30,41,59,.6);border:2px solid rgba(99,102,241,.3);border-radius:12px;padding:1.3rem;word-break:break-all;font-family:monospace;color:#a5b4fc}
                        .btn-copy,.btn-close {flex:1;padding:1.1rem;border-radius:12px;font-weight:600;cursor:pointer}
                        .btn-copy {background:linear-gradient(135deg,#10b981,#059669);color:white;border:none}
                        .btn-close {background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.4)}
                    `}</style>

                    {!isSetup ? (
                        <div className="setup-container">
                            <div className="setup-card">
                                <div style={{textAlign:'center',marginBottom:'2.5rem'}}>
                                    <Icons.Lock size={64} style={{color:'#6366f1',marginBottom:'1.2rem'}} />
                                    <h1 style={{fontSize:'2.1rem',background:'linear-gradient(135deg,#6366f1,#ec4899)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Chat Effimera</h1>
                                    <p style={{color:'#94a3b8',marginTop:'.6rem'}}>Messaggi che si autodistruggono dopo la lettura</p>
                                </div>

                                <div style={{display:'flex',flexDirection:'column',gap:'1.6rem'}}>
                                    <div>
                                        <label style={{display:'block',marginBottom:'.5rem',color:'#cbd5e1'}}>Il tuo nome</label>
                                        <input
                                            type="text"
                                            value={userName}
                                            onChange={e => setUserName(e.target.value)}
                                            placeholder="Come ti chiami?"
                                            onKeyPress={e => {
                                                if (e.key === 'Enter') {
                                                    roomId ? joinRoom() : createNewRoom();
                                                }
                                            }}
                                            style={{width:'100%',padding:'.9rem 1.2rem',background:'rgba(30,41,59,.7)',border:'2px solid rgba(99,102,241,.3)',borderRadius:12,color:'white',fontSize:'1.05rem'}}
                                        />
                                    </div>

                                    <button
                                        onClick={roomId ? joinRoom : createNewRoom}
                                        disabled={!userName.trim()}
                                        className="btn-primary"
                                    >
                                        {roomId ? 'Entra nella chat' : 'Crea nuova chat privata'}
                                    </button>

                                    {!roomId && (
                                        <>
                                            <div style={{textAlign:'center',color:'#64748b',margin:'1rem 0'}}>— oppure —</div>
                                            <div>
                                                <label style={{display:'block',marginBottom:'.5rem',color:'#cbd5e1'}}>Hai un link?</label>
                                                <input
                                                    type="text"
                                                    placeholder="Incolla qui il link..."
                                                    onChange={e => {
                                                        try {
                                                            const url = new URL(e.target.value);
                                                            const r = url.searchParams.get('room');
                                                            if (r) {
                                                                setRoomId(r);
                                                                window.history.pushState({}, '', `?room=${r}`);
                                                            }
                                                        } catch {}
                                                    }}
                                                    style={{width:'100%',padding:'.9rem 1.2rem',background:'rgba(30,41,59,.7)',border:'2px solid rgba(99,102,241,.3)',borderRadius:12,color:'white',fontSize:'1.05rem'}}
                                                />
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <>
                            {showShareModal && (
                                <div className="modal-overlay" onClick={() => setShowShareModal(false)}>
                                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                                        <h2 style={{textAlign:'center',fontSize:'1.8rem',marginBottom:'.8rem',background:'linear-gradient(135deg,#6366f1,#ec4899)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Condividi</h2>
                                        <p style={{textAlign:'center',color:'#94a3b8',marginBottom:'1.6rem'}}>Invia questo link all'altra persona</p>

                                        <div className="link-container">{getShareLink()}</div>

                                        <div style={{display:'flex',gap:'1rem',marginTop:'1.8rem'}}>
                                            <button onClick={copyShareLink} className={`btn-copy ${copied ? 'copied' : ''}`}>
                                                {copied ? <>✓ Copiato!</> : 'Copia link'}
                                            </button>
                                            <button onClick={() => setShowShareModal(false)} className="btn-close">Chiudi</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="chat-header">
                                <div className="header-title">
                                    <Icons.Lock size={26} style={{color:'#6366f1'}} />
                                    <h1>Chat Effimera</h1>
                                </div>
                                <div style={{display:'flex',gap:'1rem',alignItems:'center',flexWrap:'wrap'}}>
                                    <div style={{padding:'.4rem .9rem',background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.3)',borderRadius:8,fontSize:'.9rem'}}>
                                        <span style={{color:'#94a3b8'}}>Tu: </span>
                                        <strong style={{color:'#a5b4fc'}}>{currentUser}</strong>
                                    </div>

                                    {/* Presenza altri utenti */}
                                    {Object.entries(presenceMap)
                                        .filter(([user]) => user !== currentUser)
                                        .map(([user, online]) => (
                                            <div key={user} className="presence-badge">
                                                <span className={`presence-dot ${online ? 'online' : 'offline'}`}></span>
                                                <span>{user}</span>
                                                <span style={{color: online ? '#22c55e' : '#ef4444', fontSize:'.8rem'}}>{online ? 'online' : 'offline'}</span>
                                            </div>
                                        ))
                                    }

                                    <button onClick={() => setShowShareModal(true)} className="btn btn-toggle">
                                        <Icons.Link size={18} /> Link
                                    </button>

                                    {isCreator && (
                                        <button onClick={terminateChat} className="btn btn-clear" style={{background:'rgba(185,28,28,.2)',borderColor:'rgba(185,28,28,.5)',color:'#f87171'}}>
                                            <Icons.Trash2 size={18} /> Termina definitivamente
                                        </button>
                                    )}

                                    {messages.length > 0 && (
                                        <button onClick={clearAll} className="btn btn-clear">
                                            <Icons.Trash2 size={18} /> Cancella tutto
                                        </button>
                                    )}

                                    <button onClick={leaveChat} className="btn btn-clear">
                                        <Icons.Unlock size={18} /> Esci
                                    </button>
                                </div>
                            </div>

                            {roomId && (
                                <div style={{padding:'0 2.4rem 1rem', background:'rgba(15,23,42,.6)', borderBottom:'1px solid rgba(99,102,241,.2)', display:'flex', alignItems:'center', gap:'1rem', flexWrap:'wrap'}}>
                                    <span style={{color:'#cbd5e1',fontSize:'.9rem'}}>Link chat:</span>
                                    <input
                                        readOnly
                                        value={getShareLink()}
                                        style={{flex:1,minWidth:0,padding:'.6rem 1rem',background:'rgba(30,41,59,.65)',border:'1px solid rgba(99,102,241,.3)',borderRadius:12,color:'#e2e8f0',fontSize:'.9rem'}}
                                        onFocus={e => e.target.select()}
                                    />
                                    <button onClick={copyShareLink} className="btn btn-toggle" style={{padding:'.6rem 1rem'}}>
                                        {copied ? '✓ Copiato' : 'Copia'}
                                    </button>
                                </div>
                            )}

                            <div className="messages-container">
                                {messages.length === 0 ? (
                                    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#64748b',textAlign:'center',gap:'1.5rem'}}>
                                        <Icons.Lock size={90} style={{opacity:0.25}} />
                                        <h2 style={{color:'#94a3b8'}}>Nessun messaggio ancora</h2>
                                        <p>I messaggi si distruggono automaticamente dopo la lettura</p>
                                    </div>
                                ) : messages.map(msg => {
                                    const own = msg.sender === currentUser;
                                    const canRead = !own && !readMessages.has(msg.id);
                                    const reading = readMessages.has(msg.id);

                                    return (
                                        <div key={msg.id} className={`message-wrapper ${own ? 'own' : ''} ${reading ? 'reading' : ''}`}>
                                            <div className={`message-bubble ${own ? 'sent' : 'received'}`}>
                                                <div style={{lineHeight:1.55}}>{msg.text}</div>
                                                <div style={{marginTop:'.7rem',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'.82rem',color:'#94a3b8'}}>
                                                    <span>
                                                        {msg.timestamp && new Date(msg.timestamp).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'})}
                                                    </span>

                                                    {canRead && (
                                                        <button onClick={() => markAsRead(msg.id)} className="read-button">
                                                            <Icons.Eye size={14} /> Leggi
                                                        </button>
                                                    )}

                                                    {!own && !canRead && !reading && (
                                                        <span style={{padding:'.2rem .6rem',background:'rgba(245,158,11,.15)',border:'1px solid rgba(245,158,11,.4)',borderRadius:6,color:'#f59e0b',fontSize:'.8rem'}}>
                                                            Letto
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                                <div ref={messagesEndRef} />
                            </div>

                            <div className="input-container">
                                {/* Typing indicator */}
                                {otherTyping && (
                                    <div style={{marginBottom:'.7rem'}}>
                                        <div className="typing-indicator">
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                        </div>
                                    </div>
                                )}
                                <div className="input-actions">
                                    <textarea
                                        className="message-input"
                                        value={inputText}
                                        onChange={handleInputChange}
                                        onKeyPress={handleKeyPress}
                                        placeholder="Scrivi un messaggio..."
                                        rows={1}
                                    />

                                    <button
                                        onClick={sendMessage}
                                        disabled={!inputText.trim()}
                                        className="btn-send"
                                    >
                                        <Icons.Send size={20} /> Invia
                                    </button>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EphemeralChat />);
    </script>
</body>
</html>
